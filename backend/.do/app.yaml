name: anova-medicals-backend
region: blr

services:
  - name: api
    source_dir: /
    github:
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    run_command: daphne -b 0.0.0.0 -p 8080 revive_cms.asgi:application
    environment_slug: python
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080

databases:
  - name: db
    engine: PG
    version: "16"
